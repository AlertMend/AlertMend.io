  <text x="120" y="130" fill="#fafafa" font-family="system-ui,sans-serif" font-size="42" font-weight="700">Monitor DocLing with AlertMend</text>
  <text x="120" y="175" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="22">Health checks · Kubernetes alerts · Auto-remediation</text>
