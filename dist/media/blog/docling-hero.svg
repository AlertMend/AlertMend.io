  <text x="200" y="325" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">Upload</text>
  <path d="M290 305h60" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <polygon points="350,305 340,300 340,310" fill="#7c3aed"/>
  <rect x="360" y="260" width="180" height="90" rx="10" fill="#3b0764" stroke="#7c3aed" stroke-width="2"/>
  <text x="450" y="300" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="18" font-weight="600">DocLing</text>
  <text x="450" y="325" text-anchor="middle" fill="#ddd6fe" font-family="system-ui,sans-serif" font-size="14">Parse API</text>
  <path d="M550 305h60" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <polygon points="610,305 600,300 600,310" fill="#7c3aed"/>
  <rect x="620" y="260" width="180" height="90" rx="10" fill="#27272a" stroke="rgba(124,58,237,0.4)" stroke-width="2"/>
  <text x="710" y="300" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="18" font-weight="600">JSON</text>
  <text x="710" y="325" text-anchor="middle" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="14">RAG pipeline</text>
