<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none" role="img" aria-label="DocLing monitoring with AlertMend">
  <rect width="1200" height="630" fill="#09090b"/>
  <rect x="60" y="60" width="1080" height="510" rx="16" fill="#18181b" stroke="rgba(244,244,245,0.1)" stroke-width="2"/>
  <!-- Grid -->
  <g opacity="0.08" stroke="#fafafa" stroke-width="1">
    <line x1="60" y1="140" x2="1140" y2="140"/>
    <line x1="60" y1="240" x2="1140" y2="240"/>
    <line x1="60" y1="340" x2="1140" y2="340"/>
    <line x1="260" y1="60" x2="260" y2="570"/>
    <line x1="460" y1="60" x2="460" y2="570"/>
    <line x1="660" y1="60" x2="660" y2="570"/>
    <line x1="860" y1="60" x2="860" y2="570"/>
  </g>
  <!-- Pipeline nodes -->
  <rect x="120" y="260" width="160" height="90" rx="10" fill="#27272a" stroke="rgba(124,58,237,0.4)" stroke-width="2"/>
