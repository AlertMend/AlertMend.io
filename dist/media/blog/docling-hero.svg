  <rect x="860" y="230" width="220" height="150" rx="12" fill="rgba(124,58,237,0.12)" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="970" cy="280" r="8" fill="#059669"/>
  <text x="990" y="285" fill="#34d399" font-family="system-ui,sans-serif" font-size="16" font-weight="600">200 OK</text>
  <text x="880" y="330" fill="#fafafa" font-family="system-ui,sans-serif" font-size="15" font-weight="600">AlertMend Monitor</text>
  <text x="880" y="355" fill="#a1a1aa" font-family="system-ui,sans-serif" font-size="13">Latency · OOM · Auto-fix</text>
